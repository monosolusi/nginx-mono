# Redirect all HTTP to HTTPS & handle ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name loonas.id app.loonas.id api.loonas.id ninjas.loonas.id api.ninjas.loonas.id kibana.loonas.id ingest-2anwz.loonas.id uat-api.ninjas.loonas.id uat-ninjas.loonas.id uat-api.loonas.id uat-app.loonas.id;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS for loonas.id
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name loonas.id;

    ssl_certificate     /etc/letsencrypt/live/loonas.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loonas.id/privkey.pem;

    location / {
        proxy_pass http://loonas_landing:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}


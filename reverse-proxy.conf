server {
    listen 80;
    listen [::]:80;
    server_name sancaka-api.monosolusi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sancaka-api.monosolusi.com;

    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem; # Will be replaced by certbot
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key; # Will be replaced by certbot

    location / {
        proxy_pass http://sancaka-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
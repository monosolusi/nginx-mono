server {
    listen 80;
    listen [::]:80;
    server_name api.loonas.id loonas.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name loonas.id;

    ssl_certificate     /etc/letsencrypt/live/loonas.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loonas.id/privkey.pem;

    location / {
        proxy_pass http://loonas_landing:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.loonas.id;

    ssl_certificate     /etc/letsencrypt/live/api.loonas.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.loonas.id/privkey.pem;

    location / {
        proxy_pass http://loonas_api:14000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}